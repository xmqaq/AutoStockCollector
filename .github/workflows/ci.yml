name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: AutoStockCollector-manage/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r AutoStockCollector-manage/requirements.txt
          pip install pytest

      - name: Python syntax check
        run: |
          python -m compileall AutoStockCollector-manage/ -q

      - name: Run unit tests
        run: |
          python -m unittest discover -s AutoStockCollector-manage/tests/unit -v

      - name: Run integration tests
        env:
          MONGODB_URI: mongodb://localhost:27017/stock_collector_test
          MONGODB_DATABASE: stock_collector_test
        run: |
          python -m unittest discover -s AutoStockCollector-manage/tests/integration -v

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: |
          cd AutoStockCollector-web
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd AutoStockCollector-web
          pnpm build
